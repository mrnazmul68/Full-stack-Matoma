services:
  # Backend Web Service
  - type: web
    name: matoma-backend
    env: node
    rootDir: Backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false # Set this in Render dashboard
      - key: MONGO_DB_NAME
        value: matoma
      - key: FRONTEND_ORIGIN
        sync: false # Set this to the frontend URL after it's deployed
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_SESSION_SECRET
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 465
      - key: SMTP_SECURE
        value: "true"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false

  # Frontend Static Site
  - type: web
    name: matoma-frontend
    env: static
    rootDir: Frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false # Set this to the backend URL (e.g., https://matoma-backend.onrender.com/api)
